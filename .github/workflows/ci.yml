name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  desktop:
    name: Desktop — lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npx vitest run --coverage
      - run: npm audit --audit-level=high

  cli:
    name: CLI — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deyad-cli/deyad-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deyad-cli/deyad-cli/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run --coverage
      - run: npm audit --audit-level=high
