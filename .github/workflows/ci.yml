name: CI

on:
  pull_request: { branches: [main] }
  push: { branches: [main] }

jobs:
  cli:
    name: CLI — test, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: deyad-cli/deyad-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deyad-cli/deyad-cli/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npx tsc --noEmit
      - run: node build.mjs

  desktop:
    name: Desktop — test, lint, typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npx tsc --noEmit
