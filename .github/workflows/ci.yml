name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  desktop:
    name: Desktop — lint, typecheck, test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npx vitest run --coverage
      - run: npm audit --audit-level=high
      - name: Upload coverage
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-coverage
          path: coverage/
      - name: Bundle size tracking
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm run build:all
          echo "## Desktop Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .vite/build/*.js 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
          find .vite/renderer -name '*.js' -o -name '*.css' 2>/dev/null | xargs ls -lhS 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  desktop-e2e:
    name: Desktop — E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          CI: true

  cli:
    name: CLI — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deyad-cli/deyad-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deyad-cli/deyad-cli/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npx vitest run --coverage
      - name: Build CLI
        run: node build.mjs
      - name: CLI bundle size
        run: |
          echo "## CLI Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lhS dist/*.js >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
      - run: npm audit --audit-level=high
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-coverage
          path: deyad-cli/deyad-cli/coverage/
