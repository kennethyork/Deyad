name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:linux
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.AppImage *.deb *.rpm 2>/dev/null > checksums-linux.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/checksums-linux.txt

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - name: Generate checksums
        shell: pwsh
        run: |
          cd dist
          Get-ChildItem *.exe | ForEach-Object { $hash = Get-FileHash $_.Name -Algorithm SHA256; "$($hash.Hash)  $($_.Name)" } | Out-File checksums-windows.txt -Encoding utf8
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            dist/*.exe
            dist/checksums-windows.txt

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deyad-cli/deyad-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deyad-cli/deyad-cli/package-lock.json
      - run: npm ci
      - run: node build.mjs
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: cli-package
          path: deyad-cli/deyad-cli/*.tgz

  publish:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge checksums
        run: |
          cat artifacts/*/checksums-*.txt > artifacts/SHA256SUMS.txt 2>/dev/null || true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux-binaries/*.AppImage
            artifacts/linux-binaries/*.deb
            artifacts/linux-binaries/*.rpm
            artifacts/windows-binaries/*.exe
            artifacts/cli-package/*.tgz
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
