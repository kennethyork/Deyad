appId: com.deyad.app
productName: Deyad
directories:
  output: dist
  buildResources: build
files:
  - "**/*"
  - "!node_modules/*/{CHANGELOG.md,README.md,*.d.ts}"
linux:
  target:
    - deb
    - rpm
    - AppImage
  artifactName: "${productName}-${arch}.${ext}"
win:
  target:
    - nsis
    - portable
  artifactName: "${productName}-${arch}.${ext}"
